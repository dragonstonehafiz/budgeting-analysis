services:
  backend:
    build:
      context: ./backend
    image: budgeting-analysis/backend
    ports:
      - "8000:8000"
    volumes:
      # Persist / mount the data directory so the XLSX file survives rebuilds
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    image: budgeting-analysis/frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
